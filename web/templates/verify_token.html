{% extends "base.html" %}

{% block content %}

<div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2>Verify Assessment Token</h2>
    <p style="color: var(--text-secondary); margin-bottom: 1.5rem;">Submit the generated assessment authorization token. Once verified, scanners can be legally launched against the scope.</p>

    <form method="POST">
        <div class="form-group">
            <label>Authorization Token</label>
            <input type="text" name="token" placeholder="Paste the hex token here..." required autocomplete="off">
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit">Verify Token</button>
            <a href="/assessments" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% block content_footer %}
{% endblock %}

{% endblock %}
