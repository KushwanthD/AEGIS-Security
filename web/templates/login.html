<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEGIS - Secure Portal Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 0;">

    <div class="card auth-container" style="max-width: 440px;">
        <div class="auth-header">
            <div class="logo-container" style="justify-content: center; margin-bottom: 0.5rem;">
                <div class="logo-icon">A</div>
                <span class="logo-text">AEG<span class="logo-accent">IS</span></span>
            </div>
            <p style="color: var(--text-secondary); margin-top: 5px;">Enterprise Security Assessment Portal</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <p style="color: var(--accent); text-align: center; margin-bottom: 1rem; font-weight: 500; font-size: 0.9rem;">{{ msg }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" style="max-width: 100%;">
            <div class="form-group" style="margin-bottom: 1rem;">
                <label>Username</label>
                <input type="text" name="username" placeholder="e.g. admin" required autocomplete="off">
            </div>

            <div class="form-group" style="margin-bottom: 1.5rem;">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" style="width: 100%; background-color: var(--accent); color: white;">Sign In</button>
        </form>

        <div class="auth-footer" style="margin-top: 1.5rem; text-align: center; display: flex; flex-direction: column; gap: 0.5rem;">
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 0.5rem;">
                Don't have an account? <a href="/register" style="color: var(--primary); font-weight: bold; text-decoration: none;">Register here</a>
            </p>
            <small style="color: var(--text-secondary); font-size: 0.8rem;">Seeded admin credentials: <b>admin / admin</b></small>
        </div>
    </div>

</body>
</html>
