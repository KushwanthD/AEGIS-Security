{% extends "base.html" %}

{% block content %}

<h2>Scan Findings</h2>

<table>

<tr>
    <th>Title</th>
    <th>Category</th>
    <th>Severity</th>
    <th>Description</th>
    <th>Evidence</th>
</tr>

{% for finding in findings %}
<tr>

    <td>{{ finding[0] }}</td>
    <td>{{ finding[1] }}</td>
    <td>{{ finding[2] }}</td>
    <td>{{ finding[3] }}</td>
    <td>{{ finding[4] }}</td>

</tr>
{% endfor %}

</table>

{% endblock %}
