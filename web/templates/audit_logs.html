{% extends "base.html" %}

{% block content %}

<h2>Audit Logs</h2>

<table>

<tr>
    <th>ID</th>
    <th>Assessment</th>
    <th>Event Type</th>
    <th>Event Details</th>
    <th>Created</th>
</tr>

{% for log in logs %}
<tr>

    <td>{{ log[0] }}</td>
    <td>{{ log[1] }}</td>
    <td>{{ log[2] }}</td>
    <td>{{ log[3] }}</td>
    <td>{{ log[4] }}</td>

</tr>
{% endfor %}

</table>

{% endblock %}
