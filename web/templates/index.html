{% extends "base.html" %}

{% block content %}

<h2>Assets</h2>

<table>

    <tr>
        <th>ID</th>
        <th>Asset</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for asset in assets %}
    <tr>

        <td>{{ asset[0] }}</td>
        <td>{{ asset[1] }}</td>
        <td>{{ asset[2] }}</td>

        <td>

        {% if asset[2] != "VERIFIED" %}

            <a href="/verify-asset/{{ asset[0] }}">
                Verify
            </a>

        {% else %}

            <a href="/request-assessment/{{ asset[0] }}">
                Request Assessment
            </a>

        {% endif %}

        </td>

    </tr>
    {% endfor %}

</table>

{% endblock %}
